env:
  default_env: base
  envs:
    base:
      base_url: https://mwc.com.vn
      explicit_wait: 10

framework:
  data_mode: manual
  ai_processed_dir: data/ai_generated/processed
  manual_dir: data/manual
  default_format: csv
  features:
    login: true
    order: true
    search: true
    profile: true
    register: true
    product_review: true

ai:
  provider: ollama
  ollama:
    base_url: http://127.0.0.1:11434
    endpoint_mode: chat
    model: "qwen3:8b"
    timeout_sec: 1800
    temperature: 0.0
    top_p: 0.7
    num_predict: 4000
    seed: 42
    think: false
    json_mode: true

  generation:
    output_root: data/ai_generated
    keep_raw: true
    default_formats:
      - json